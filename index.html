<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Библиотека вопросов</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #0f172a;
        --text-muted: #475569;
        --border: #e2e8f0;
        --radius-sm: 6px;
        --radius-md: 10px;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        max-width: 960px; /* Более компактная ширина для удобства чтения */
        margin: 0 auto;
        padding: 24px 16px; /* Уменьшенные внешние отступы */
        line-height: 1.5;
      }

      h1 {
        text-align: center;
        font-size: 1.8rem; /* Чуть уменьшенный, аккуратный заголовок */
        margin-top: 8px;
        margin-bottom: 4px;
        color: var(--text-main);
        font-weight: 800;
      }

      .subtitle {
        text-align: center;
        color: var(--text-muted);
        margin-bottom: 20px;
        font-size: 0.95rem;
      }

      .header-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }

      .search-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .search-container {
        flex-grow: 1;
        position: relative;
      }

      .search-input {
        width: 100%;
        padding: 8px 40px 8px 12px;
        font-size: 0.95rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        outline: none;
        box-sizing: border-box;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .search-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      .search-hint {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.7rem;
        color: #94a3b8;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        pointer-events: none;
        background: #f8fafc;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        white-space: nowrap;
        transition: color 0.15s;
      }

      .nav-link:hover {
        color: var(--primary-hover);
        text-decoration: underline;
      }

      /* Кнопки переключения категорий */
      .filters-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
      }

      .filter-btn {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--text-muted);
        transition: all 0.15s ease;
        user-select: none;
      }

      .filter-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
      }

      .filter-btn.active {
        background-color: var(--primary);
        border-color: var(--primary);
        color: #ffffff;
      }

      /* Карточка категории */
      .category {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 16px 20px; /* Компактные отступы внутри карт */
        margin-bottom: 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .category-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin-top: 0;
        margin-bottom: 12px;
        color: var(--text-main);
        border-bottom: 1px solid var(--border);
        padding-bottom: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .category-count {
        font-size: 0.75rem;
        background: #f1f5f9;
        color: var(--text-muted);
        padding: 2px 6px;
        border-radius: 999px;
        font-weight: 600;
      }

      /* Блок отдельного вопроса */
      .question-block {
        border-bottom: 1px solid #f1f5f9;
        padding: 10px 0; /* Меньше вертикальных пустот */
      }

      .question-block:last-child {
        border-bottom: none;
      }

      .question {
        cursor: pointer;
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-main);
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
        transition:
          color 0.15s,
          background-color 0.15s;
        border-radius: 6px;
        padding: 4px 6px;
        margin: -4px -6px;
      }

      .question:hover {
        color: var(--primary);
      }

      .question.kbd-selected {
        background-color: #eff6ff;
        outline: 1px solid #bfdbfe;
      }

      .question-arrow {
        font-size: 0.75rem;
        color: var(--text-muted);
        transition:
          transform 0.15s,
          color 0.15s;
        flex-shrink: 0;
        margin-left: 8px;
      }

      .question.active .question-arrow {
        transform: rotate(90deg);
        color: var(--primary);
      }

      /* Ответ */
      .answer {
        display: none;
        margin-top: 8px;
        padding: 10px 14px;
        background: #f8fafc;
        border-left: 3px solid var(--primary);
        border-radius: 0 6px 6px 0;
        color: var(--text-muted);
        font-size: 0.9rem;
        white-space: pre-line;
        line-height: 1.5;
      }

      .answer.show {
        display: block;
      }

      /* Дополнительное оформление для вставок кода в тексте */
      code {
        font-family:
          SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        background-color: #f1f5f9;
        padding: 2px 4px;
        border-radius: 4px;
        font-size: 0.9em;
      }

      .question code {
        color: #a1772a;
      }

      .answer code {
        color: #e11d48;
      }

      mark.hl {
        background-color: #fde68a;
        color: inherit;
        padding: 0 2px;
        border-radius: 3px;
        font-weight: inherit;
      }

      .no-results {
        text-align: center;
        color: var(--text-muted);
        padding: 30px 0;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Библиотека вопросов</h1>

    <div class="header-actions">
      <!-- Строка поиска и ссылка -->
      <div class="search-row">
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="🔍 Быстрый поиск по вопросам и ответам..."
          />
          <span class="search-hint">/</span>
        </div>
        <a href="creator.html" class="nav-link">Панель управления ⚙️</a>
      </div>

      <!-- Кнопки категорий (выводятся под поиском) -->
      <div id="filtersContainer" class="filters-container">
        <!-- Кнопки создаются динамически через JS -->
      </div>
    </div>

    <div id="content">Загрузка вопросов...</div>

    <script>
      let allData = [];
      let activeCategory = "all"; // Хранит выбранный фильтр ('all' или имя категории)
      let searchQuery = ""; // Хранит текущую поисковую строку

      // Плоский список отрендеренных .question элементов (для навигации стрелками)
      let currentVisibleQuestions = [];
      let selectedIndex = -1;

      // ---------- Форматирование текста ----------

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function applyInlineFormatting(safeText) {
        // Замена **текст** на <strong>текст</strong>
        safeText = safeText.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        // Замена `код` на <code>код</code>
        safeText = safeText.replace(/`(.*?)`/g, "<code>$1</code>");
        return safeText;
      }

      // Обратная совместимость (используется, когда поиск пустой)
      function formatMarkdown(text) {
        if (!text) return "";
        return applyInlineFormatting(escapeHtml(text));
      }

      // ---------- Нечёткий поиск (устойчив к опечаткам) ----------

      function levenshtein(a, b) {
        const m = a.length,
          n = b.length;
        if (m === 0) return n;
        if (n === 0) return m;
        const dp = new Array(n + 1);
        for (let j = 0; j <= n; j++) dp[j] = j;
        for (let i = 1; i <= m; i++) {
          let prev = dp[0];
          dp[0] = i;
          for (let j = 1; j <= n; j++) {
            const temp = dp[j];
            dp[j] =
              a[i - 1] === b[j - 1]
                ? prev
                : 1 + Math.min(prev, dp[j], dp[j - 1]);
            prev = temp;
          }
        }
        return dp[n];
      }

      // Ищет query в text: сначала точное вхождение подстроки,
      // затем — по словам, допуская опечатки (расстояние Левенштейна)
      function fuzzyMatch(text, query) {
        if (!query) return { match: false };
        const lowerText = text.toLowerCase();
        const lowerQuery = query.toLowerCase();

        const idx = lowerText.indexOf(lowerQuery);
        if (idx !== -1) {
          return {
            match: true,
            exact: true,
            index: idx,
            length: lowerQuery.length,
          };
        }

        // Нечёткое сравнение по словам (юникод: буквы + цифры, работает с кириллицей)
        const wordRe = /[\p{L}\p{N}]+/gu;
        const threshold =
          lowerQuery.length <= 4 ? 1 : Math.ceil(lowerQuery.length / 4);

        let best = null;
        let m;
        while ((m = wordRe.exec(lowerText)) !== null) {
          const word = m[0];
          if (Math.abs(word.length - lowerQuery.length) > threshold + 1)
            continue;
          const dist = levenshtein(word, lowerQuery);
          if (dist <= threshold && (!best || dist < best.dist)) {
            best = { dist, index: m.index, length: word.length };
          }
        }

        if (best) {
          return {
            match: true,
            exact: false,
            index: best.index,
            length: best.length,
            dist: best.dist,
          };
        }
        return { match: false };
      }

      // Считает результат совпадения для сортировки по релевантности
      // и возвращает информацию для подсветки
      function getMatchInfo(rawText, query) {
        if (!query)
          return { match: true, score: 0, safeText: escapeHtml(rawText) };
        const safeText = escapeHtml(rawText);
        const m = fuzzyMatch(safeText, query);
        if (!m.match) return { match: false, score: -1, safeText };
        return { match: true, score: m.exact ? 2 : 1, m, safeText };
      }

      // Собирает финальный HTML вопроса/ответа с подсветкой найденного фрагмента
      function renderWithHighlight(info) {
        const safeText = info.safeText;
        if (!info.match || !info.m) {
          return applyInlineFormatting(safeText);
        }
        const { index, length } = info.m;
        const before = safeText.slice(0, index);
        const matched = safeText.slice(index, index + length);
        const after = safeText.slice(index + length);
        const highlighted =
          before + '<mark class="hl">' + matched + "</mark>" + after;
        return applyInlineFormatting(highlighted);
      }

      // ---------- Загрузка данных ----------

      fetch("questions.json")
        .then((res) => res.json())
        .then((data) => {
          allData = data;
          renderCategoryButtons(allData);
          renderQuestions(allData);
        })
        .catch((err) => {
          document.getElementById("content").innerHTML = `
                    <div class="no-results" style="color: #ef4444;">
                        Ошибка загрузки вопросов. Убедитесь, что файл <strong>questions.json</strong> доступен.
                    </div>`;
          console.error(err);
        });

      // Создание кнопок категорий в исходном порядке
      function renderCategoryButtons(categories) {
        const container = document.getElementById("filtersContainer");
        container.innerHTML = "";

        const allBtn = document.createElement("button");
        allBtn.className = "filter-btn active";
        allBtn.innerText = "Все";
        allBtn.dataset.category = "all";
        allBtn.addEventListener("click", () => selectCategory("all"));
        container.appendChild(allBtn);

        categories.forEach((cat) => {
          const btn = document.createElement("button");
          btn.className = "filter-btn";
          btn.innerText = cat.category;
          btn.dataset.category = cat.category;
          btn.addEventListener("click", () => selectCategory(cat.category));
          container.appendChild(btn);
        });
      }

      function selectCategory(categoryName) {
        activeCategory = categoryName;

        const buttons = document.querySelectorAll(".filter-btn");
        buttons.forEach((btn) => {
          if (btn.dataset.category === categoryName) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });

        renderQuestions(allData, searchQuery, activeCategory);
      }

      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", (e) => {
        searchQuery = e.target.value.trim();
        renderQuestions(allData, searchQuery, activeCategory);
      });

      // ---------- Рендеринг списка вопросов ----------

      function renderQuestions(
        categories,
        query = "",
        selectedCategory = "all",
      ) {
        const container = document.getElementById("content");
        container.innerHTML = "";
        currentVisibleQuestions = [];
        selectedIndex = -1;

        let foundAny = false;
        let totalShown = 0;
        let singleQaPair = null; // { qDiv, aDiv } если найден единственный результат

        categories.forEach((cat) => {
          if (selectedCategory !== "all" && cat.category !== selectedCategory) {
            return;
          }

          const categoryMatches =
            !query || cat.category.toLowerCase().includes(query.toLowerCase());

          // Считаем релевантность и фильтруем вопросы
          const scoredItems = cat.items
            .map((item) => {
              const qInfo = getMatchInfo(item.question, query);
              const aInfo = getMatchInfo(item.answer, query);
              let include =
                !query || categoryMatches || qInfo.match || aInfo.match;
              // Приоритет: точное совпадение в вопросе > нечёткое в вопросе >
              // точное в ответе > нечёткое в ответе > совпадение только по названию категории
              let score = 0;
              if (qInfo.match) score = Math.max(score, 2 + qInfo.score);
              if (aInfo.match) score = Math.max(score, aInfo.score);
              return { item, qInfo, aInfo, include, score };
            })
            .filter((x) => x.include);

          // Сортировка по релевантности (более точные совпадения выше)
          if (query) {
            scoredItems.sort((a, b) => b.score - a.score);
          }

          if (scoredItems.length > 0) {
            foundAny = true;
            totalShown += scoredItems.length;

            const catDiv = document.createElement("div");
            catDiv.className = "category";

            const title = document.createElement("h2");
            title.className = "category-title";
            title.innerHTML = `
                        <span>${escapeHtml(cat.category)}</span>
                        <span class="category-count">${scoredItems.length}</span>
                    `;
            catDiv.appendChild(title);

            scoredItems.forEach(({ item, qInfo, aInfo }) => {
              const qBlock = document.createElement("div");
              qBlock.className = "question-block";

              const qDiv = document.createElement("div");
              qDiv.className = "question";

              const qText = document.createElement("span");
              qText.innerHTML = renderWithHighlight(qInfo);

              const arrow = document.createElement("span");
              arrow.className = "question-arrow";
              arrow.innerHTML = "▶";

              qDiv.appendChild(qText);
              qDiv.appendChild(arrow);

              const aDiv = document.createElement("div");
              aDiv.className = "answer";
              aDiv.innerHTML = renderWithHighlight(aInfo);

              qDiv.addEventListener("click", () => {
                const isActive = qDiv.classList.toggle("active");
                aDiv.classList.toggle("show");
                arrow.innerHTML = isActive ? "▼" : "▶";
              });

              qBlock.appendChild(qDiv);
              qBlock.appendChild(aDiv);
              catDiv.appendChild(qBlock);

              currentVisibleQuestions.push(qDiv);
              if (totalShown === 1 && scoredItems.length === 1) {
                // потенциальный единственный результат — уточним после всего цикла
              }
              singleQaPair = { qDiv, aDiv };
            });

            container.appendChild(catDiv);
          }
        });

        if (!foundAny) {
          container.innerHTML =
            '<div class="no-results">По вашему запросу ничего не найдено 😕</div>';
        }

        // Автораскрытие, если результат ровно один
        if (query && totalShown === 1 && singleQaPair) {
          singleQaPair.qDiv.click();
        }
      }

      // ---------- Горячие клавиши ----------

      function updateKeyboardSelection(newIndex) {
        if (!currentVisibleQuestions.length) return;
        if (selectedIndex >= 0 && currentVisibleQuestions[selectedIndex]) {
          currentVisibleQuestions[selectedIndex].classList.remove(
            "kbd-selected",
          );
        }
        selectedIndex =
          ((newIndex % currentVisibleQuestions.length) +
            currentVisibleQuestions.length) %
          currentVisibleQuestions.length;
        const el = currentVisibleQuestions[selectedIndex];
        el.classList.add("kbd-selected");
        el.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }

      // "/" — фокус на поиск из любого места страницы
      document.addEventListener("keydown", (e) => {
        if (e.key === "/" && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
      });

      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown") {
          e.preventDefault();
          updateKeyboardSelection(selectedIndex + 1);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          updateKeyboardSelection(selectedIndex - 1);
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (selectedIndex === -1 && currentVisibleQuestions.length) {
            updateKeyboardSelection(0);
          }
          if (selectedIndex !== -1 && currentVisibleQuestions[selectedIndex]) {
            currentVisibleQuestions[selectedIndex].click();
          }
        } else if (e.key === "Escape") {
          searchInput.value = "";
          searchQuery = "";
          renderQuestions(allData, searchQuery, activeCategory);
          searchInput.blur();
        }
      });
    </script>
  </body>
</html>
