<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конструктор вопросов</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f3f4f6; }
        h1 { text-align: center; color: #333; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #3498db; text-decoration: none; }
        
        .form-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        textarea { height: 100px; resize: vertical; }
        
        button { background-color: #2ecc71; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #27ae60; }
        .btn-download { background-color: #3498db; width: 100%; padding: 15px; font-weight: bold; font-size: 18px; margin-bottom: 30px;}
        .btn-download:hover { background-color: #2980b9; }
        .btn-delete { background-color: #e74c3c; padding: 5px 10px; font-size: 12px; margin-left: 10px; }
        .btn-delete:hover { background-color: #c0392b; }

        .preview-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .preview-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .preview-category-title { background: #eef2f7; padding: 5px 10px; border-radius: 4px; margin-top: 15px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← На главную к вопросам</a>
    <h1>Конструктор вопросов</h1>

    <!-- Кнопка сохранения -->
    <button id="downloadBtn" class="btn-download">💾 СКАЧАТЬ ОБНОВЛЕННЫЙ QUESTIONS.JSON</button>

    <!-- Форма добавления -->
    <div class="form-section">
        <h2>Добавить новый вопрос в список</h2>
        <form id="addForm">
            <div class="form-group">
                <label for="categoryInput">Категория (выберите из списка или напишите новую):</label>
                <input type="text" id="categoryInput" list="categoriesDatalist" required placeholder="Например: JavaScript или HTML">
                <datalist id="categoriesDatalist"></datalist>
            </div>
            <div class="form-group">
                <label for="questionInput">Вопрос:</label>
                <input type="text" id="questionInput" required placeholder="Например: Что такое замыкание?">
            </div>
            <div class="form-group">
                <label for="answerInput">Ответ:</label>
                <textarea id="answerInput" required placeholder="Введите подробный ответ..."></textarea>
            </div>
            <button type="submit">➕ Добавить в список</button>
        </form>
    </div>

    <!-- Список для удаления и просмотра -->
    <div class="preview-section">
        <h2>Что сейчас есть в списке:</h2>
        <div id="questionsList">Загрузка вопросов...</div>
    </div>

    <script>
        let categories = []; 

        // 1. Загружаем текущий файл с сервера
        fetch('questions.json')
            .then(res => {
                if(!res.ok) throw new Error();
                return res.json();
            })
            .then(data => {
                categories = data;
                updateUI();
            })
            .catch(() => {
                categories = []; 
                updateUI();
            });

        // 2. Добавление вопроса
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const categoryName = document.getElementById('categoryInput').value.trim();
            const questionText = document.getElementById('questionInput').value.trim();
            const answerText = document.getElementById('answerInput').value.trim();

            let targetCategory = categories.find(c => c.category.toLowerCase() === categoryName.toLowerCase());

            if (!targetCategory) {
                targetCategory = { category: categoryName, items: [] };
                categories.push(targetCategory);
            }

            targetCategory.items.push({
                question: questionText,
                answer: answerText
            });

            document.getElementById('questionInput').value = '';
            document.getElementById('answerInput').value = '';

            updateUI();
        });

        // 3. Обновление интерфейса
        function updateUI() {
            renderEditorList();
            renderDatalist();
        }

        function renderDatalist() {
            const datalist = document.getElementById('categoriesDatalist');
            datalist.innerHTML = '';
            categories.forEach(c => {
                const option = document.createElement('option');
                option.value = c.category;
                datalist.appendChild(option);
            });
        }

        function renderEditorList() {
            const listDiv = document.getElementById('questionsList');
            listDiv.innerHTML = '';

            if (categories.length === 0) {
                listDiv.innerHTML = '<p>Список пока пуст.</p>';
                return;
            }

            categories.forEach((cat, catIndex) => {
                const catHeader = document.createElement('h3');
                catHeader.className = 'preview-category-title';
                catHeader.innerText = cat.category;
                listDiv.appendChild(catHeader);

                cat.items.forEach((item, itemIndex) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'preview-item';
                    
                    const textSpan = document.createElement('span');
                    textSpan.innerHTML = `<strong>В:</strong> ${item.question}`;
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'btn-delete';
                    deleteBtn.innerText = 'Удалить';
                    deleteBtn.onclick = () => deleteQuestion(catIndex, itemIndex);

                    itemDiv.appendChild(textSpan);
                    itemDiv.appendChild(deleteBtn);
                    listDiv.appendChild(itemDiv);
                });
            });
        }

        function deleteQuestion(catIndex, itemIndex) {
            categories[catIndex].items.splice(itemIndex, 1);
            
            if (categories[catIndex].items.length === 0) {
                categories.splice(catIndex, 1);
            }
            updateUI();
        }

        // 4. Скачивание обновленного файла JSON
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const jsonString = JSON.stringify(categories, null, 2); 
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = 'questions.json'; 
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
